<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Odds Today & Tomorrow</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f9f9f9; }
  h1 { text-align: center; padding: 1rem; background: #2d6cdf; color: white; margin: 0; }
  table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
  th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
  th { background-color: #2d6cdf; color: white; position: sticky; top: 0; }
  tr:nth-child(even) { background-color: #f2f2f2; }
  .highlight { color: red; font-weight: bold; }
  .container { padding: 0.5rem; }
</style>
</head>
<body>
<h1>Tennis Matches Today & Tomorrow (Favorites ≤ -2000)</h1>
<div class="container">
  <table id="matchesTable">
    <thead>
      <tr>
        <th>Date</th>
        <th>Event</th>
        <th>Time</th>
        <th>Match</th>
        <th>Favorite Odds</th>
      </tr>
    </thead>
    <tbody id="matchesBody">
      <tr><td colspan="5">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script>
async function fetchMatches() {
  const proxy = "https://api.allorigins.win/get?url=";
  const url = encodeURIComponent("https://oddspedia.com/tennis");
  
  try {
    const response = await fetch(proxy + url);
    const textData = await response.json();
    const parser = new DOMParser();
    const doc = parser.parseFromString(textData.contents, "text/html");

    const rows = doc.querySelectorAll(".eventRow");
    const tbody = document.getElementById("matchesBody");
    tbody.innerHTML = ""; // clear loading

    const today = new Date();
    const tomorrow = new Date();
    tomorrow.setDate(today.getDate() + 1);

    let count = 0;

    rows.forEach(row => {
      const dateStr = row.querySelector(".eventRow__date")?.textContent.trim();
      const players = row.querySelector(".eventRow__name")?.textContent.trim();
      const event = row.querySelector(".eventRow__tournament")?.textContent.trim() || "Unknown";
      const time = row.querySelector(".eventRow__time")?.textContent.trim() || "TBD";
      const oddsCells = row.querySelectorAll(".oddsCell__odd");
      if (!players || oddsCells.length < 2 || !dateStr) return;

      // parse date string (assumes format like "Apr 2, 2026")
      const matchDate = new Date(dateStr + " 2026"); // year placeholder, may adjust
      if (matchDate.toDateString() !== today.toDateString() &&
          matchDate.toDateString() !== tomorrow.toDateString()) return;

      const d1 = parseFloat(oddsCells[0].textContent.trim());
      const d2 = parseFloat(oddsCells[1].textContent.trim());
      if (isNaN(d1) || isNaN(d2)) return;

      const a1 = d1 >= 2 ? Math.round((d1-1)*100) : Math.round(-100/(d1-1));
      const a2 = d2 >= 2 ? Math.round((d2-1)*100) : Math.round(-100/(d2-1));
      const favorite = Math.abs(a1) < Math.abs(a2) ? a1 : a2;

      if (favorite <= -2000) {
        const tr = document.createElement("tr");
        const favClass = favorite <= -3000 ? "highlight" : "";
        tr.innerHTML = `<td>${dateStr}</td><td>${event}</td><td>${time}</td><td>${players}</td><td class="${favClass}">${favorite}</td>`;
        tbody.appendChild(tr);
        count++;
      }
    });

    if (count === 0) {
      tbody.innerHTML = `<tr><td colspan="5">No matches found for today or tomorrow with favorites ≤ -2000</td></tr>`;
    }

  } catch (err) {
    document.getElementById("matchesBody").innerHTML = `<tr><td colspan="5">Error fetching data: ${err}</td></tr>`;
  }
}

// Fetch immediately
fetchMatches();
</script>
</body>
</html>
